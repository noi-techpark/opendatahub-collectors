name: CI tr-webcam-panocloud

on: 
  push:
    paths:
      - "transformers/webcam-panocloud/**"
      - ".github/workflows/tr-webcam-panocloud.yml"     

env:
  PROJECT_NAME: tr-webcam-panocloud
  WORKING_DIRECTORY: transformers/webcam-panocloud
  DOCKER_IMAGE: ghcr.io/noi-techpark/opendatahub-collectors/tr-webcam-panocloud
  DOCKER_TAG: ${{ github.sha }}

jobs:
  tests:
    runs-on: ubuntu-24.04
    concurrency: tr-webcam-panocloud-tests
    
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
      
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.24.0
          
      - name: Install Dependencies
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: cd src && go mod tidy
        
      - name: Run Tests
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: cd src && go test -v ./...

  build:
    runs-on: ubuntu-24.04
    concurrency: tr-webcam-panocloud-build
    needs: 
      - tests
    steps:
    - name: Checkout source code
      uses: actions/checkout@v4

    - name: Build and push images
      uses: noi-techpark/github-actions/docker-build-and-push@v2
      with:
        working-directory: ${{ env.WORKING_DIRECTORY }}/infrastructure
        docker-username: ${{ github.actor }}
        docker-password: ${{ secrets.GITHUB_TOKEN }}
