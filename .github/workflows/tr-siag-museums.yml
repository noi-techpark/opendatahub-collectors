name: CI/CD tr-siag-museums

on:
  push:
    paths:
      - "transformers/siag-museum/infrastructure/**"
      - "transformers/siag-museum/src/**"
      - ".github/workflows/tr-siag-museums.yml"

env:
  PROJECT_NAME: tr-siag-museum
  WORKING_DIRECTORY: transformers/siag-museum
  DOCKER_IMAGE: ghcr.io/noi-techpark/opendatahub-collectors/tr-siag-museum
  DOCKER_TAG: ${{ github.sha }}
  KUBERNETES_NAMESPACE: collector

jobs:
  build:
    runs-on: ubuntu-24.04
    concurrency: tr-siag-museums-build
    steps:
    - name: Checkout source code
      uses: actions/checkout@v4

    - name: Build and push images
      uses: noi-techpark/github-actions/docker-build-and-push@v2
      with:
        working-directory: ${{ env.WORKING_DIRECTORY }}/infrastructure
        docker-username: ${{ github.actor }}
        docker-password: ${{ secrets.GITHUB_TOKEN }}

  deploy-test:
    if: github.ref == 'refs/heads/main'
    needs:
      - build
    runs-on: ubuntu-24.04
    concurrency: tr-siag-museums-deploy-test
    environment: test
    env:
      VALUES_YAML: infrastructure/helm/siag-museum.test.yaml
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Customize values.yaml
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: |
          yq -i '.image.repository = "${{ env.DOCKER_IMAGE }}"' ${{ env.VALUES_YAML }}
          yq -i '.image.tag = "${{ env.DOCKER_TAG }}"' ${{ env.VALUES_YAML }}
          yq -i '.image.pullPolicy = "IfNotPresent"' ${{ env.VALUES_YAML }}
          yq -i '.envSecret.ODH_CORE_TOKEN_CLIENT_ID = "${{ secrets.CONTENT_SIAG_CLIENT_ID }}"' ${{ env.VALUES_YAML }}
          yq -i '.envSecret.ODH_CORE_TOKEN_CLIENT_SECRET = "${{ secrets.CONTENT_SIAG_CLIENT_SECRET }}"' ${{ env.VALUES_YAML }}

      - name: Deploy on cluster
        uses: noi-techpark/github-actions/helm-deploy@v2
        with:
          k8s-name: ${{ env.PROJECT_NAME }}
          k8s-namespace: collector
          chart-path: helm/generic-collector
          values-file: ${{ env.WORKING_DIRECTORY }}/${{ env.VALUES_YAML }}
          aws-access-key-id: ${{ secrets[vars.AWS_KEY_ID] }}
          aws-secret-access-key: ${{ secrets[vars.AWS_KEY_SECRET] }}
          aws-eks-cluster-name: aws-main-eu-01
          aws-region: eu-west-1

