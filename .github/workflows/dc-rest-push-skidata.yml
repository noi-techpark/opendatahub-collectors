name: CI/CD dc-rest-push-skidata

on:
  push:
    paths:
      - "collectors/rest-push-skidata/**"
      - ".github/workflows/dc-rest-push-skidata.yml"

env:
  WORKING_DIRECTORY: collectors/rest-push-skidata
  DOCKER_IMAGE: ghcr.io/noi-techpark/opendatahub-collectors/dc-rest-push-skidata
  DOCKER_TAG: ${{ github.sha }}
  KUBERNETES_NAMESPACE: collector
  K8S_NAME: dc-rest-push-skidata

jobs:
  build:
    runs-on: ubuntu-24.04
    concurrency: dc-rest-push-skidata-build
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Build and push images
        uses: noi-techpark/github-actions/docker-build-and-push@v2
        with:
          working-directory: ${{ env.WORKING_DIRECTORY }}/infrastructure
          docker-username: ${{ github.actor }}
          docker-password: ${{ secrets.GITHUB_TOKEN }}

  deploy-test:
    if: github.ref == 'refs/heads/main' || github.ref == 'dev/skidata'
    needs: build
    runs-on: ubuntu-24.04
    concurrency: dc-rest-push-skidata-test
    environment: test
    env:
      VALUES_YAML: infrastructure/helm/values.test.yaml
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Customize values.yaml
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: |
          yq -i '.image.repository="${{ env.DOCKER_IMAGE }}"' ${{ env.VALUES_YAML }}
          yq -i '.image.tag="${{ env.DOCKER_TAG }}"' ${{ env.VALUES_YAML }}
          yq -i '.image.pullPolicy="IfNotPresent"' ${{ env.VALUES_YAML }}
          yq -i '.env.SKIDATA_BASE_URL = "https://sweb.skidata.com"' ${{ env.VALUES_YAML }}
          yq -i '.envSecret.INBOUND_AUTH_USER = "${{ secrets.SKIDATA_PUSH_INBOUND_USER }}"' ${{ env.VALUES_YAML }}
          yq -i '.envSecret.INBOUND_AUTH_PASS = "${{ secrets.SKIDATA_PUSH_INBOUND_PASS }}"' ${{ env.VALUES_YAML }}
          yq -i '.envSecret.SKIDATA_CREDENTIALS_JSON = ${{ secrets.SKIDATA_PUSH_CREDENTIALS_JSON }}' ${{ env.VALUES_YAML }}

      - name: Deploy on cluster
        uses: noi-techpark/github-actions/helm-deploy@v2
        with:
          k8s-name: ${{ env.K8S_NAME }}
          k8s-namespace: ${{ env.KUBERNETES_NAMESPACE }}
          chart-path: helm/generic-collector
          values-file: ${{ env.WORKING_DIRECTORY }}/${{ env.VALUES_YAML }}
          aws-access-key-id: ${{ secrets[vars.AWS_KEY_ID] }}
          aws-secret-access-key: ${{ secrets[vars.AWS_KEY_SECRET] }}
          aws-eks-cluster-name: aws-main-eu-01
          aws-region: eu-west-1

