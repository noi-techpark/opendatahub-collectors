name: CI/CD tr-webcam-panomax

on:
  push:
    paths:
      - "transformers/webcam-panomax/**"
      - ".github/workflows/tr-webcam-panomax.yml"

env:
  PROJECT_NAME: tr-webcam-panomax
  WORKING_DIRECTORY: transformers/webcam-panomax
  DOCKER_IMAGE: ghcr.io/noi-techpark/opendatahub-collectors/tr-webcam-panomax
  DOCKER_TAG: ${{ github.sha }}
  KUBERNETES_NAMESPACE: collector

jobs:
  tests:
    runs-on: ubuntu-24.04
    concurrency: tr-webcam-panomax-tests

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.24.0

      - name: Install Dependencies
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: cd src && go mod tidy

      - name: Run Tests
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: cd src && go test -v ./...

  build:
    runs-on: ubuntu-24.04
    concurrency: tr-webcam-panomax-build
    needs:
      - tests
    steps:
    - name: Checkout source code
      uses: actions/checkout@v4

    - name: Build and push images
      uses: noi-techpark/github-actions/docker-build-and-push@v2
      with:
        working-directory: ${{ env.WORKING_DIRECTORY }}/infrastructure
        docker-username: ${{ github.actor }}
        docker-password: ${{ secrets.GITHUB_TOKEN }}

  deploy-test:
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/feat/webcam'
    needs:
      - build
    runs-on: ubuntu-24.04
    concurrency: tr-webcam-panomax-deploy-test
    environment: test
    env:
      VALUES_YAML: infrastructure/helm/webcam-panomax.test.yaml
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Customize values.yaml
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: |
            yq -i '.image.repository = "${{ env.DOCKER_IMAGE }}"' ${{ env.VALUES_YAML }}
            yq -i '.image.tag = "${{ env.DOCKER_TAG }}"' ${{ env.VALUES_YAML }}
            yq -i '.image.pullPolicy = "IfNotPresent"' ${{ env.VALUES_YAML }}
            yq -i '.envSecret.ODH_CORE_TOKEN_CLIENT_ID = "${{ secrets.ODH_CORE_TOKEN_CLIENT_ID_WEBCAM }}"' ${{ env.VALUES_YAML }}
            yq -i '.envSecret.ODH_CORE_TOKEN_CLIENT_SECRET = "${{ secrets.ODH_CORE_TOKEN_CLIENT_SECRET_WEBCAM }}"' ${{ env.VALUES_YAML }}

      - name: Deploy on cluster
        uses: noi-techpark/github-actions/helm-deploy@v2
        with:
          k8s-name: ${{ env.PROJECT_NAME }}
          k8s-namespace: ${{ env.KUBERNETES_NAMESPACE }}
          chart-path: helm/generic-collector
          values-file: ${{ env.WORKING_DIRECTORY }}/${{ env.VALUES_YAML }}
          aws-access-key-id: ${{ secrets[vars.AWS_KEY_ID] }}
          aws-secret-access-key: ${{ secrets[vars.AWS_KEY_SECRET] }}
          aws-eks-cluster-name: aws-main-eu-01
          aws-region: eu-west-1
