replicaCount: 1

image:
  repository: ghcr.io/noi-techpark/opendatahub-collectors/tr-smart-taxi-merano
  pullPolicy: IfNotPresent
  tag: sometaghere

imagePullSecrets:
  - name: container-registry-r

env:
  # ODH Core Writer Connection
  BDP_BASE_URL: http://bdp-core.core.svc.cluster.local
  BDP_PROVENANCE_NAME:
  BDP_PROVENANCE_VERSION:
  BDP_ORIGIN: Municipality Merano

  LOG_LEVEL: INFO

  # RabbitMQ Connection
  MQ_QUEUE: smarttaxi.merano
  MQ_EXCHANGE: routed
  MQ_KEY: smarttaxi.merano
  MQ_CLIENT: tr-smart-taxi-merano

  RAW_DATA_BRIDGE_ENDPOINT: http://raw-data-bridge.core.svc.cluster.local:2000

  SERVICE_NAME: tr-smart-taxi-merano
  TELEMETRY_TRACE_GRPC_ENDPOINT: tempo-distributor-discovery.monitoring.svc.cluster.local:4317

envSecretRef:
  - name: MQ_URI
    secret: rabbitmq-svcbind
    key: uri
  - name: BDP_TOKEN_URL
    secret: oauth-collector
    key: tokenUri
  - name: BDP_CLIENT_ID
    secret: oauth-collector
    key: clientId
  - name: BDP_CLIENT_SECRET
    secret: oauth-collector
    key: clientSecret
