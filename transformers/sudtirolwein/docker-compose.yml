x-app-common:
  &app-common
  build:
    dockerfile: infrastructure/docker/Dockerfile
    context: .
    target: dev
  env_file:
    - .env
  volumes:
    - ./src:/code
    - ./infrastructure:/code/infrastructure
    - pkg:/go/pkg/mod
  working_dir: /code

services:

  # Full pipeline: connects to infrastructure-v2 (no local RabbitMQ)
  # docker compose --profile bdp up --build
  app-bdp:
    <<: *app-common
    profiles:
      - bdp
    networks:
      - ingestion
    environment:
      - MQ_URI=${MQ_URI}
      - MQ_CLIENT=${MQ_CLIENT}
      - MQ_EXCHANGE=${MQ_EXCHANGE}
      - MQ_QUEUE=${MQ_QUEUE}
      - MQ_KEY=${MQ_KEY}
      - RAW_DATA_BRIDGE_ENDPOINT=${RAW_DATA_BRIDGE_ENDPOINT}
      - ODH_CORE_URL=${ODH_CORE_URL}
      - ODH_CORE_TOKEN_URL=${ODH_CORE_TOKEN_URL}
      - ODH_CORE_TOKEN_CLIENT_ID=${ODH_CORE_TOKEN_CLIENT_ID}
      - ODH_CORE_TOKEN_CLIENT_SECRET=${ODH_CORE_TOKEN_CLIENT_SECRET}
      - SKIP_SSL_VERIFY=${SKIP_SSL_VERIFY}
      - INSECURE_SKIP_VERIFY=${INSECURE_SKIP_VERIFY}
      - SERVICE_NAME=${SERVICE_NAME}
      - LOG_LEVEL=${LOG_LEVEL}

volumes:
  pkg:

networks:
  ingestion:
    external: true