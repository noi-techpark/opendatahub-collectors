x-app-common:
  &app-common
  build:
    dockerfile: infrastructure/docker/Dockerfile
    context: .
    target: dev
  env_file:
    - .env
  volumes:
    - ./src:/code
    - ./infrastructure:/code/infrastructure
    - pkg:/go/pkg/mod
  working_dir: /code

services:

  # Full pipeline: connects to infrastructure-v2 (no local RabbitMQ)
  # docker compose --profile bdp up --build
  app-bdp:
    <<: *app-common
    profiles:
      - bdp
    networks:
      - ingestion
    environment:
      - CORE_URL=${CORE_URL}
      - ODH_CORE_URL=${ODH_CORE_URL}
      - SKIP_SSL_VERIFY=${SKIP_SSL_VERIFY}
      - INSECURE_SKIP_VERIFY=${INSECURE_SKIP_VERIFY}

volumes:
  pkg:

networks:
  ingestion:
    external: true