globals:
  rootContext: []
  
steps:
  - type: forEach
    values: [1, 2]
    as: id
      
    steps:
      - type: request
        name: Get Facility Free Places
        request:
          url: https://www.onecenter.info/api/DAZ/FacilityFreePlaces?FacilityID={{ .id }}
          method: GET
          headers:
            Accept: application/json
        resultTransformer: '.FreePlaces'
        mergeWithParentOn:  . + [$res]
