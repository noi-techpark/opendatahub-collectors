steps:
  - type: request
    name: Fetch Facilities
    request:
      url: https://www.onecenter.info/api/DAZ/GetFacilities
      method: GET
      headers:
        Accept: application/json
    resultTransformer: |
      [.Facilities[]
        | select(.ReceiptMerchant == "STA – Strutture Trasporto Alto Adige SpA Via dei Conciapelli, 60 39100  Bolzano UID: 00586190217")
      ]
    mergeWithParentOn: .Facilities =| $res
    steps:
      - type: forEach
        path: .
        as: facility
        steps:
          - type: request
            name: Get Facility Free Places
            request:
              url: https://www.onecenter.info/api/DAZ/FacilityFreePlaces?FacilityID={{ facility.FacilityId }}
              method: GET
              headers:
                Accept: application/json
            resultTransformer: '[.Data.FreePlaces]'
            mergeWithParentOn: .FacilityDetails =| $res

          - type: forEach
            path: facility.subFacilities
            as: sub
            steps:
              - type: request
                name: Get SubFacility Free Places
                request:
                  url: https://www.onecenter.info/api/DAZ/FacilityFreePlaces?FacilityID={{ sub.FacilityId }}
                  method: GET
                  headers:
                    Accept: application/json
                resultTransformer: '[.Data.FreePlaces]'
                mergeWithParentOn: .SubFacilityDetails =| $res

              - type: forEach
                path: sub.locations
                as: loc
                steps:
                  - type: request
                    name: Get Location Details
                    request:
                      url: https://www.onecenter.info/api/DAZ/Locations/{{ loc }}
                      method: GET
                      headers:
                        Accept: application/json
                    #resultName: loc
                    mergeWithContext:
                      name: sub
                      rule: .locationDetails = (.locationDetails // []) + [$loc]
