globals:
  rootContext: []
  
steps:
  - type: request
    name: Fetch Facilities
    request:
      url: https://www.onecenter.info/api/DAZ/GetFacilities
      method: GET
      headers:
        Accept: application/json
      body:

    pagination:
      query:
        - param: from
          value:
            - type: int
              default: 0
              increment: 10
        - param: to
          value:
            - type: int
              default: 10
              increment: 10
        - param: date
          value:
            - type: datetime
              format: 2006-01-02T15:04:05Z07:00
              default: 2025-01-01T00:00:00
              increment: 4w
        - param: token
          value: 
            - type: header
              headerKey: foo
        - param: token2
          value:
            - type: body
              valueExtractor: .nextPageToken
      body:
        # same as query
      stopOn:
        # value is the selector for call response
        empty: 
          response: .data
        # these 2 looks at computed pagination.query/body
        empty: 
          body: <param_name>
        empty: 
          header: <param_name>

        gt:
          query: 
            from: 30
        
        lt:
          header: 
            date: 2026-01-01T00:00:00 | now | now + 3w

    resultTransformer: .data
    