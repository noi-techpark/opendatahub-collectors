rootContext: []
stream: true

auth:
  type: oauth
  method: password
  tokenUrl: https://www.onecenter.info/oauth/token
  username: sta@xpk.it
  password: bcRWk68jXk679NK

steps:
  - type: request
    name: Get Facilities
    request:
      url: https://www.onecenter.info/api/DAZ/GetFacilities
      method: GET
      headers:
        Accept: application/json
    resultTransformer: |
      [.Data.Facilities[]
        | select(.ReceiptMerchant == "STA – Strutture Trasporto Alto Adige SpA Via dei Conciapelli, 60 39100  Bolzano UID: 00586190217")
      ]
    mergeOn:  . = $res

    steps:
      - type: forEach
        as: facility
        path: .
        steps:
          - type: request
            name: Get Facility Details
            request:
              url: https://www.onecenter.info/api/DAZ/FacilityFreePlaces?FacilityID={{ .facility.FacilityId }}
              method: GET
              headers:
                Accept: application/json
            resultTransformer: .Data.FreePlaces
            mergeOn: .FacilityDetails = $res