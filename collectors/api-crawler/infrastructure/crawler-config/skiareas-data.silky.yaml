rootContext: {}
stream: false

# Collector: DSS SkiArea
# Source:  https://www.dolomitisuperski.com/jsonexport/export/talschaften
# Target:  ODH SkiArea endpoint
# Key:     rid (string, e.g. "1", "4a") → match via Mapping.dss.rid in ODH
# Note:    Overview endpoint excluded per senior instructions — general info only.

steps:

  - type: request
    name: "Fetch DSS SkiAreas (talschaften)"
    request:
      url: "https://www.dolomitisuperski.com/jsonexport/export/talschaften?username=idmidm&password=idmidm"
      method: GET
    resultTransformer: "."
    mergeOn: .dssSkiAreas = $res