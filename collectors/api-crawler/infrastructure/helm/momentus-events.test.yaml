image:
  repository: ghcr.io/noi-techpark/opendatahub-collectors/api-crawler
  pullPolicy: IfNotPresent
  tag: "0.2.0" # Set this when upgrading chart with --set-value

env:
  LOG_LEVEL: "INFO"
  MQ_CLIENT: dc-api-crawler-momentus-events
  PROVIDER: api-crawler/momentus-events

  CRON: "0 0 0/6 * * *"
  CONFIG_PATH: "/config/config.yaml"

  SERVICE_NAME: dc-api-crawler-momentus-events
  TELEMETRY_TRACE_GRPC_ENDPOINT: tempo-distributor-discovery.monitoring.svc.cluster.local:4317

envSecretRef:
  - name: MQ_URI
    secret: rabbitmq-svcbind
    key: uri

# NOTE: the silky config (config.yaml) contains OAuth clientId/clientSecret.
# Mount it from a Kubernetes Secret rather than a ConfigMap to avoid exposing credentials.
configMap:
  mountPath: "/config/"
  files: {}
