services:
  dc-api-crawler-webcam-feratel:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile
      target: dev
    env_file:
      - .env
    volumes:
      - ./src:/code
      - ./infrastructure:/code/infrastructure
      - pkg:/go/pkg/mod
    working_dir: /code
    profiles:
      - bdp
    networks:
      - ingestion

volumes:
  pkg:

networks:
  ingestion:
    external: true
